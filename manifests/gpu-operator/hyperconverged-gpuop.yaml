apiVersion: hco.kubevirt.io/v1beta1
kind: HyperConverged
metadata:
  name: kubevirt-hyperconverged
  namespace: openshift-cnv
spec:
  # Permit GPU Operator-managed devices for VM passthrough.
  # externalResourceProvider: true tells KubeVirt these are owned by an external
  # device plugin (the GPU Operator sandbox plugin), not KubeVirt's own.
  #
  # PCI IDs for this cluster:
  #   10DE:2330 — H100 SXM5 80GB (GH100GL)
  #   10DE:22A3 — NVSwitch (GH100)
  #
  # Resource names below are generated by GPU Operator NFD.
  # Verify with: oc describe node lp-nvaie-rh-gpu03 | grep nvidia
  # and confirm the exact string, then update RESOURCE_NAME placeholders.
  permittedHostDevices:
    pciHostDevices:
    - pciDeviceSelector: "10DE:2330"
      resourceName: "nvidia.com/GH100_H100_SXM5_80GB"
      externalResourceProvider: true
    - pciDeviceSelector: "10DE:22A3"
      resourceName: "nvidia.com/GH100_H100_NVSWITCH"
      externalResourceProvider: true
