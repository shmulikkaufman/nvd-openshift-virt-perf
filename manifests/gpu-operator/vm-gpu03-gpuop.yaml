apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: gpu-operator-vm-gpu03
  namespace: gpu-vms
  labels:
    app: gpu-operator-vm-gpu03
spec:
  runStrategy: Always
  dataVolumeTemplates:
  - metadata:
      name: gpu-operator-vm-gpu03-disk
    spec:
      source:
        http:
          url: "https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img"
      storage:
        resources:
          requests:
            storage: 80Gi
        storageClassName: lvms-vmstorage-gpu03-immediate
        accessModes:
        - ReadWriteOnce
        volumeMode: Block
  template:
    metadata:
      labels:
        kubevirt.io/vm: gpu-operator-vm-gpu03
    spec:
      nodeSelector:
        kubernetes.io/hostname: lp-nvaie-rh-gpu03
      architecture: amd64
      domain:
        cpu:
          cores: 64
          sockets: 1
          threads: 1
          maxSockets: 1
        machine:
          type: q35
        memory:
          guest: 400Gi
        resources:
          requests:
            memory: 400Gi
        devices:
          disks:
          - name: rootdisk
            disk:
              bus: virtio
          - name: cloudinit
            disk:
              bus: virtio
          interfaces:
          - name: default
            masquerade: {}
          # GPU Operator sandbox device plugin exposes model-specific resource names.
          # Confirm names: oc describe node lp-nvaie-rh-gpu03 | grep nvidia
          gpus:
          - name: gpu-0
            deviceName: nvidia.com/GH100GL_H100_SXM5_80GB
          - name: gpu-1
            deviceName: nvidia.com/GH100GL_H100_SXM5_80GB
          - name: gpu-2
            deviceName: nvidia.com/GH100GL_H100_SXM5_80GB
          - name: gpu-3
            deviceName: nvidia.com/GH100GL_H100_SXM5_80GB
          - name: gpu-4
            deviceName: nvidia.com/GH100GL_H100_SXM5_80GB
          - name: gpu-5
            deviceName: nvidia.com/GH100GL_H100_SXM5_80GB
          - name: gpu-6
            deviceName: nvidia.com/GH100GL_H100_SXM5_80GB
          - name: gpu-7
            deviceName: nvidia.com/GH100GL_H100_SXM5_80GB
          hostDevices:
          - name: nvswitch-0
            deviceName: nvidia.com/GH100_NVSwitch
          - name: nvswitch-1
            deviceName: nvidia.com/GH100_NVSwitch
          - name: nvswitch-2
            deviceName: nvidia.com/GH100_NVSwitch
          - name: nvswitch-3
            deviceName: nvidia.com/GH100_NVSwitch
      networks:
      - name: default
        pod: {}
      volumes:
      - name: rootdisk
        dataVolume:
          name: gpu-operator-vm-gpu03-disk
      - name: cloudinit
        cloudInitNoCloud:
          userData: |
            #cloud-config
            user: ubuntu
            password: ubuntu123
            chpasswd:
              expire: false
            ssh_pwauth: true
            ssh_authorized_keys:
            - ssh-rsa  nvidia@lp-nvaie-rh-gpu01
